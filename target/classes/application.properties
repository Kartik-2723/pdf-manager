# ===================================
#  PDF Manager - Application Config
# ===================================

spring.application.name=pdf-manager

# --- Server ---
server.port=8080

# --- H2 In-Memory Database (Dev) ---
spring.datasource.url=jdbc:h2:mem:pdfdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- File Upload Limits ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# --- PDF Storage Strategy: DB or FILESYSTEM ---
# Options: DB | FILESYSTEM
pdf.storage.strategy=DB

# --- Filesystem storage path (used when strategy=FILESYSTEM) ---
pdf.storage.filesystem.path=./uploads/pdfs

# --- Logging ---
logging.level.com.pdfmanager=DEBUG
logging.level.org.springframework.web=INFO
